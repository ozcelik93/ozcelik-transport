<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Özçelik">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a7a2e">
<title>Özçelik Transport</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1a7a2e;--green2:#145c22;--green-bg:#e8f5eb;--green-light:#f0faf2;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --gray:#f5f5f2;--gray2:#e8e5e0;--gray3:#6b6860;
  --white:#fff;--text:#1a1a18;--text2:#6b6860;
  --border:#e0ddd8;
  --radius:12px;--radius-sm:8px;
  --nav-h:64px;--hdr-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;overflow:hidden;background:var(--gray);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);font-size:15px}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--green-light);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#loading img{width:180px;object-fit:contain}
#loading .spin{width:32px;height:32px;border:3px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#login{display:none;position:fixed;inset:0;background:linear-gradient(160deg,var(--green-light) 0%,#fff 60%);flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:0;overflow-y:auto}
#login.show{display:flex}
.login-logo{width:200px;margin-bottom:24px}
.login-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(26,122,46,.1)}
.login-subtitle{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.4}
.user-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius);background:#fff;width:100%;margin-bottom:10px;cursor:pointer;transition:all .15s;text-align:left}
.user-btn:active{transform:scale(.97)}
.user-btn.sel{border-color:var(--green);background:var(--green-bg)}
.uav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.uav.g{background:var(--green)}.uav.b{background:var(--blue)}.uav.p{background:#6B21A8}
.uname{font-size:15px;font-weight:600}
.urole{font-size:12px;color:var(--text2);margin-top:1px}
.login-btn{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s}
.login-btn:active{background:var(--green2)}
.login-btn:disabled{background:var(--gray2);color:var(--text2)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none}

/* ── APP ── */
#app{display:none;position:fixed;inset:0;flex-direction:column}
#app.show{display:flex}

/* HEADER */
.hdr{height:var(--hdr-h);background:var(--green);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;padding-top:env(safe-area-inset-top,0)}
.hdr-logo{height:32px;object-fit:contain}
.hdr-title{color:#fff;font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-user{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#7fff9f;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--gray);padding-bottom:calc(var(--nav-h) + var(--safe-bottom))}

/* BOTTOM NAV */
.bottom-nav{height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:var(--safe-bottom);position:relative;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text2);font-size:10px;font-weight:500;border:none;background:none;padding:0;transition:color .12s;-webkit-tap-highlight-color:transparent}
.nav-btn:active{opacity:.7}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:22px;height:22px}
.nav-btn .nbadge{background:var(--green);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;min-width:16px;text-align:center}

/* PAGES */
.page{display:none;padding:0}.page.active{display:block}

/* CARDS */
.card{background:#fff;border-radius:var(--radius);margin:12px 12px 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hdr h3{font-size:14px;font-weight:600}
.card:last-child{margin-bottom:12px}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.stat{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* LIST ITEMS */
.list-item{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;-webkit-tap-highlight-color:transparent}
.list-item:active{background:var(--gray)}
.list-item:last-child{border-bottom:none}
.li-main{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.li-amount{font-size:13px;font-weight:700;color:var(--green)}
.chevron{color:var(--gray2);font-size:18px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-gray{background:#F1EFE8;color:#444}.b-blue{background:var(--blue-bg);color:#0C447C}
.b-green{background:var(--green-bg);color:var(--green2)}.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red)}.b-teal{background:#E1F5EE;color:#085041}

/* STATUS SELECT */
.sstat{border:none;background:transparent;font-size:11px;font-weight:600;padding:3px 18px 3px 8px;border-radius:20px;outline:none;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2710%27 height=%276%27%3E%3Cpath d=%27M0 0l5 6 5-6z%27 fill=%27%23666%27/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 4px center;cursor:pointer}
.s-new{background:#F1EFE8;color:#444}.s-plan{background:var(--blue-bg);color:#0C447C}
.s-road{background:var(--green-bg);color:var(--green2)}.s-delay{background:var(--amber-bg);color:var(--amber-text)}
.s-done{background:#E1F5EE;color:#085041}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.8}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:8px 12px;font-size:13px}
.btn-xs{padding:6px 10px;font-size:12px}
.btn-full{width:100%;padding:14px;border-radius:var(--radius);font-size:15px}
.btn-row{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}

/* FAB (Floating Action Button) */
.fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + 16px + var(--safe-bottom));width:56px;height:56px;border-radius:28px;background:var(--green);color:#fff;border:none;box-shadow:0 4px 16px rgba(26,122,46,.4);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:50;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.92)}

/* SHEET MODAL (slides up from bottom) */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:var(--safe-bottom);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--gray2);border-radius:2px;margin:10px auto 0}
.sheet-hdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--border)}
.sheet-hdr h2{font-size:17px;font-weight:700}
.sheet-body{padding:16px 20px;padding-bottom:8px}
.sheet-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:#fff;position:sticky;bottom:0}
.xbtn{background:none;border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);cursor:pointer}

/* FORMS */
.form-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding:16px 0 8px;border-top:1px solid var(--border);margin-top:8px}
.form-sec:first-child{border-top:none;margin-top:0;padding-top:0}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:12px;color:var(--text2);font-weight:600}
.inp{padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:#fff;color:var(--text);font-family:inherit;width:100%;-webkit-appearance:none;transition:border-color .12s}
.inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,122,46,.1)}
select.inp{cursor:pointer}
textarea.inp{resize:none;min-height:80px}

/* TOTAL BAR */
.total-bar{background:var(--green-bg);border-top:1px solid #c8e6c9;padding:12px 16px;display:flex;align-items:center;gap:12px;overflow-x:auto}
.ti{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.ti .tv{font-size:14px;font-weight:700;color:var(--green)}
.ti .tl{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase}
.ti.big .tv{font-size:17px;color:var(--green2)}
.vsep{width:1px;height:28px;background:#c8e6c9;flex-shrink:0}

/* DETAIL VIEW */
.detail-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.detail-label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:6px;letter-spacing:.3px}
.detail-value{font-size:15px;font-weight:600}
.detail-sub{font-size:13px;color:var(--text2);margin-top:2px}
.detail-highlight{background:var(--green-bg);border-left:3px solid var(--green);padding:12px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:-14px -16px 14px;padding-top:26px}
.detail-highlight-red{background:var(--red-bg);border-left:3px solid var(--red)}

/* VEHICLE CARD */
.veh-card{background:#fff;border-radius:var(--radius);margin:12px 12px 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.veh-head{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.plate{font-family:monospace;font-size:14px;font-weight:700;background:#1a1a18;color:#fff;padding:4px 10px;border-radius:6px}
.cert-list{padding:4px 0}
.cert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.cert-row:last-child{border-bottom:none}
.cert-name{font-size:13px;font-weight:600}
.cert-date{font-size:12px;color:var(--text2)}
.cert-status{font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px}
.cs-ok{background:var(--green-bg);color:var(--green2)}
.cs-warn{background:var(--amber-bg);color:var(--amber-text)}
.cs-danger{background:var(--red-bg);color:var(--red)}
.cs-empty{background:var(--gray2);color:var(--text2)}

/* EMAIL PREVIEW */
.email-box{background:var(--gray);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:13px;line-height:1.8;white-space:pre-line;font-family:monospace;margin-top:8px}

/* LANG TOGGLE */
.lang-toggle{display:flex;gap:6px}
.lang-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer}
.lang-btn.active{border-color:var(--green);background:var(--green);color:#fff}

/* WARN BANNER */
.warn-banner{background:var(--amber-bg);border-left:4px solid var(--amber);padding:12px 14px;margin:12px 12px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.warn-banner-title{font-size:13px;font-weight:700;color:var(--amber-text)}
.warn-banner-item{font-size:12px;color:var(--amber-text);margin-top:4px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 16px;font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;cursor:pointer;border-bottom:2.5px solid transparent;flex-shrink:0}
.tab.on{color:var(--green);border-bottom-color:var(--green)}

/* TOAST */
.toast{position:fixed;top:calc(var(--hdr-h) + 8px);left:16px;right:16px;background:var(--green2);color:#fff;border-radius:var(--radius);padding:12px 16px;font-size:14px;font-weight:600;z-index:999;text-align:center;transform:translateY(-80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.warn{background:var(--amber)}
.toast.err{background:var(--red)}

/* DRIVER MSG */
.drv-msg{background:#e9f7ef;border:1px solid #a8d5be;border-radius:var(--radius-sm);padding:14px;font-size:13px;line-height:1.9;white-space:pre-line;font-family:monospace}

/* CMR */
.cmr-wrap{background:#fff;padding:12px;font-family:Arial,sans-serif;font-size:9px;color:#000;overflow-x:auto}
.cmr-grid{display:grid;grid-template-columns:1fr 1fr;border:1.5px solid #333}
.cb{border:1px solid #aaa;padding:5px;min-height:38px;position:relative}
.cb.full{grid-column:1/-1}
.cb label{display:block;font-size:6.5px;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:2px}
.cb p{font-size:9px;font-weight:600;color:#111;line-height:1.4;margin:0}
.cmr-num{position:absolute;top:2px;right:3px;font-size:6.5px;color:#aaa}
.cmr-goods{border:1.5px solid #333;border-top:none;overflow-x:auto}
.cmr-sigs{display:grid;grid-template-columns:1fr 1fr 1fr;border:1.5px solid #333;border-top:none}
.cs2{border-right:1px solid #aaa;padding:6px;text-align:center;min-height:44px}
.cs2:last-child{border-right:none}
.cs2 label{font-size:6.5px;font-weight:700;text-transform:uppercase;color:#666;display:block}

/* ADDRESS CARD */
.addr-card{background:#fff;border-radius:var(--radius);margin:12px 12px 0;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.addr-firma{font-size:15px;font-weight:700}
.addr-info{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.6}
.addr-badge{margin-top:6px}

/* SCROLLABLE ACTIONS */
.action-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.action-scroll::-webkit-scrollbar{display:none}
</style>
</head>

<script>
'use strict';
const SUPABASE_URL='https://tqqrvhduenrdrcmixdaf.supabase.co';
const SUPABASE_KEY='sb_publishable_Xa2Wo16PPI6hwVfbqwK3gQ_buYhdJZM';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=id=>document.getElementById(id);
const fmt=n=>(n||0).toLocaleString('tr-TR');
const fmtDate=d=>{if(!d)return'—';const p=String(d).split('-');return(p[2]||'?').substring(0,2)+'.'+p[1]+'.'+p[0];};
const today=()=>{const d=new Date();return d.getDate().toString().padStart(2,'0')+'.'+( d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getFullYear();};
const daysUntil=d=>{if(!d)return null;return Math.ceil((new Date(d)-new Date())/864e5);};
const certSt=d=>{if(!d)return'';const n=daysUntil(d);return n<0?'danger':n<=30?'danger':n<=90?'warn':'ok';};
const certLbl=d=>{if(!d)return'Girilmemiş';const n=daysUntil(d);if(n<0)return Math.abs(n)+' gün geçti!';if(n===0)return'Bugün bitiyor!';return n+' gün kaldı';};

function showToast(msg,type='ok'){
  const t=$('toast');t.textContent=(type==='ok'?'✓ ':type==='warn'?'⚠ ':'✕ ')+msg;
  t.className='toast show'+(type==='warn'?' warn':type==='err'?' err':'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

let currentUser=null,selectedUser=null;
let orders=[],vehicles=[],addresses=[],ihbarlar=[],notifHistory=[];
let currentPage='dashboard';
let konumLang='TR',ihbarLang='TR';

// ── LOGIN ──────────────────────────────────────────────
function selUser(u,el){
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel'); selectedUser=u;
  $('login-btn').disabled=false;
}
const LOCAL_USERS = {
  ruveyda: {id:'1', username:'ruveyda', display_name:'Rüveyda Civan',  avatar_color:'blue'},
  can:     {id:'2', username:'can',     display_name:'Can Özçelik',    avatar_color:'green'},
  fatih:   {id:'3', username:'fatih',   display_name:'Fatih Özçelik',  avatar_color:'purple'},
};

async function doLogin(){
  if(!selectedUser)return;
  $('login-btn').textContent='Giriş yapılıyor...'; $('login-btn').disabled=true;
  $('login-err').style.display='none';
  try{
    // 3 saniye içinde Supabase'den kullanıcıyı çek, yoksa yerel kullan
    const fetchPromise = sb.from('users').select('*').eq('username',selectedUser).single();
    const timeoutPromise = new Promise((_,reject) => setTimeout(()=>reject(new Error('timeout')),3000));
    let data;
    try {
      const result = await Promise.race([fetchPromise, timeoutPromise]);
      data = result.data || LOCAL_USERS[selectedUser];
    } catch {
      // Supabase yavaş veya bağlantı yok — yerel kullanıcıyla devam et
      data = LOCAL_USERS[selectedUser];
    }
    if(!data) throw new Error('Kullanıcı bulunamadı');
    currentUser=data;
    $('login').classList.remove('show');
    await startApp();
  }catch(e){
    $('login-err').textContent=e.message||'Giriş başarısız';
    $('login-err').style.display='block';
    $('login-btn').textContent='Giriş Yap';$('login-btn').disabled=false;
  }
}
function logout(){
  currentUser=null;$('app').classList.remove('show');$('login').classList.add('show');
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('sel'));
  selectedUser=null;$('login-btn').disabled=true;$('login-btn').textContent='Giriş Yap';
  closeSheet();
}
function showLogoutSheet(){
  openSheet('',currentUser?.display_name||'',[`<div style="padding:8px 0">
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Hesaptan çıkmak istediğinizden emin misiniz?</div>
    <button class="btn btn-red btn-full" onclick="closeSheet();logout()">Çıkış Yap</button>
  </div>`].join(''),null);
}

// ── APP START ──────────────────────────────────────────
async function startApp(){
  // Önce loading'i kapat, login'i göster — Supabase'i beklemeden
  $('loading').style.display='none';
  $('app').classList.add('show');

  const parts=(currentUser.display_name||'').split(' ');
  const ini=((parts[0]?.[0]||'')+( parts[1]?.[0]||'')).toUpperCase();
  $('hdr-user').textContent=ini;
  const colors={ruveyda:'var(--blue)',can:'var(--green)',fatih:'#6B21A8'};
  $('hdr-user').style.background=colors[currentUser.username]||'var(--green)';

  // Dashboard'u hemen göster, veri gelince güncelle
  showPage('dashboard');

  // Verileri arka planda yükle
  try {
    await Promise.all([loadOrders(),loadVehicles(),loadAddresses(),loadIhbarlar(),loadNotifHistory()]);
    renderCurrent();
    setupRealtime();
  } catch(e) {
    showToast('Veri yüklenirken hata: '+e.message, 'warn');
  }
}

function setupRealtime(){
  $('sync-dot').style.display='block';
  sb.channel('mob-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'orders'},p=>{
      if(p.eventType==='INSERT'){orders.unshift(p.new);if(p.new.created_by!==currentUser?.username)showToast(p.new.id+' eklendi');}
      else if(p.eventType==='UPDATE'){const i=orders.findIndex(x=>x.id===p.new.id);if(i>=0)orders[i]=p.new;}
      else if(p.eventType==='DELETE'){orders=orders.filter(x=>x.id!==p.old.id);}
      if(currentPage==='dashboard'||currentPage==='siparisler')renderCurrent();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'vehicles'},async()=>{await loadVehicles();if(currentPage==='filo')renderCurrent();})
    .on('postgres_changes',{event:'*',schema:'public',table:'addresses'},async()=>{await loadAddresses();})
    .subscribe();
}

async function loadOrders(){const{data}=await sb.from('orders').select('*').order('created_at',{ascending:false});orders=data||[];}
async function loadVehicles(){const{data}=await sb.from('vehicles').select('*').eq('aktif',true).order('plate');vehicles=data||[];}
async function loadAddresses(){const{data}=await sb.from('addresses').select('*').order('firma');addresses=data||[];}
async function loadIhbarlar(){const{data}=await sb.from('ihbarlar').select('*').order('created_at',{ascending:false}).limit(50);ihbarlar=data||[];}
async function loadNotifHistory(){const{data}=await sb.from('notif_history').select('*').order('created_at',{ascending:false}).limit(50);notifHistory=data||[];}

async function nextOrderId(){
  const{data}=await sb.from('order_counter').select('current_val').eq('id',1).single();
  const val=data?.current_val||1;
  await sb.from('order_counter').update({current_val:val+1}).eq('id',1);
  return 'OZC-'+String(val).padStart(6,'0');
}

function showPage(id,el){
  currentPage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const p=$('page-'+id);if(p)p.classList.add('active');
  if(el)el.classList.add('active');
  else document.querySelector(\`.nav-btn[data-page="${id}"]\`)?.classList.add('active');
  $('hdr-title').textContent=pageTitles[id]||id;
  renderCurrent();
}
function renderCurrent(){
  switch(currentPage){
    case 'dashboard':  renderDashboard();break;
    case 'siparisler': renderSiparisler();break;
    case 'filo':       renderFilo();break;
    case 'adresler':   renderAdresler();break;
    case 'diger':      renderDiger();break;
  }
}

function renderOrderList(list){

    const sm=statusMap[o.durum]||statusMap['Yeni Sipariş'];
    const top=(o.navlun||0)+(o.gumruk||0)+(o.sig||0)+(o.ek||0);
    return `<div class="list-item" onclick='openOrderDetail(${JSON.stringify(o.id)})'>
      <div class="li-main">
        <div class="li-title">${o.musteri}</div>
        <div class="li-sub" style="font-family:monospace;font-size:11px">${o.id}${o.musteri_sip?' · '+o.musteri_sip:''}</div>

    </div>`;

let _orderSearch='',_orderStatus='';
function filterOrders(q){_orderSearch=q.toLowerCase();applyOrderFilter();}
function filterStatus(s){_orderStatus=s;applyOrderFilter();}
function applyOrderFilter(){
  const f=orders.filter(o=>{
    const mQ=!_orderSearch||(o.id+o.musteri+(o.musteri_sip||'')).toLowerCase().includes(_orderSearch);
    const mS=!_orderStatus||o.durum===_orderStatus;
    return mQ&&mS;
  });
  const el=$('order-list');if(el)el.innerHTML=renderOrderList(f);
}

async function chStatus(id,durum){
  const{error}=await sb.from('orders').update({durum}).eq('id',id);
  if(error){showToast(error.message,'err');return;}
  const o=orders.find(x=>x.id===id);if(o)o.durum=durum;
  showToast(id+' → '+durum); closeSheet(); renderCurrent();
}

function togMobArac(){

function calcMobT(){

  if($('mtf-n')){$('mtf-n').textContent=f(n);$('mtf-g').textContent=f(g);$('mtf-s').textContent=f(s);$('mtf-t').textContent=f(n+g+s+e);}
}

    cikis_g:$('f-cg')?.value||'',varis_g:$('f-vg')?.value||'',transit:$('f-tr')?.value||'',tir:$('f-tir')?.value||'',
    yuk:$('f-yuk')?.value||'',kg:parseFloat($('f-kg')?.value)||0,hacim:parseFloat($('f-hcm')?.value)||0,
    navlun:parseFloat($('f-nav')?.value)||0,gumruk:parseFloat($('f-gum')?.value)||0,sig:parseFloat($('f-sig')?.value)||0,ek:parseFloat($('f-ek')?.value)||0,
    para:$('f-para')?.value||'EUR',odeme:$('f-ode')?.value||'Prepaid',
    updated_at:new Date().toISOString()
  };
  try{
    if(_editId){
      const{error}=await sb.from('orders').update(body).eq('id',_editId);
      if(error)throw error;
      const i=orders.findIndex(x=>x.id===_editId);if(i>=0)orders[i]={...orders[i],...body};
      showToast(_editId+' güncellendi');
    } else {
      const id=await nextOrderId();
      const{data,error}=await sb.from('orders').insert({...body,id,durum:'Yeni Sipariş',konum:'—',created_by:currentUser?.username||''}).select().single();
      if(error)throw error;
      orders.unshift(data);
      showToast(id+' oluşturuldu');
    }
    closeSheet();renderCurrent();
  }catch(e){showToast(e.message,'err');}
}

function cpEl(id){

  });
}

function renderVehCard(v){
  const certs=[
    {n:'Muayene',d:v.muayene_bitis,extra:''},
    {n:'Kalibrasyon',d:v.kalibrasyon_bitis,extra:v.kalibrasyon_sertno?'No: '+v.kalibrasyon_sertno:''},
    {n:'FRC',d:v.frc_bitis,extra:v.frc_no?'No: '+v.frc_no:''},
    {n:'ATP',d:v.atp_bitis,extra:v.atp_no?'No: '+v.atp_no:''},
    {n:'Egzoz',d:v.egzoz_bitis,extra:''},
    {n:'Sigorta',d:v.sigorta_bitis,extra:v.sigorta_sirket||''  },
  ];
  const hasWarn=certs.some(c=>{const n=daysUntil(c.d);return n!==null&&n<=90;});
  return `<div class="veh-card" style="margin-bottom:0;${hasWarn?'border-left:3px solid var(--amber)':''}">
    <div class="veh-head">
      <div class="plate">${v.plate}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${v.driver||'Sürücü yok'}</div><div style="font-size:12px;color:var(--text2)">${v.driver_phone||''}</div></div>
      <button class="btn btn-xs" onclick='openVehForm(${JSON.stringify(v.id)})'>Düzenle</button>
    </div>
    <div class="cert-list">
      ${certs.map(c=>{
        const st=certSt(c.d);
        const stCls={ok:'cs-ok',warn:'cs-warn',danger:'cs-danger','':'cs-empty'}[st]||'cs-empty';
        return `<div class="cert-row">
          <div><div class="cert-name">${c.n}</div>${c.extra?`<div class="cert-date">${c.extra}</div>`:''}</div>
          <div style="text-align:right"><div class="cert-date">${c.d?fmtDate(c.d):'—'}</div><div class="cert-status ${stCls}">${certLbl(c.d)}</div></div>
        </div>`;
      }).join('')}
    </div>
    ${v.notlar?`<div style="padding:10px 16px;font-size:12px;color:var(--text2);font-style:italic;border-top:1px solid var(--border)">${v.notlar}</div>`:''}
  </div>`;
}

      if(v){const{error}=await sb.from('vehicles').update(body).eq('id',v.id);if(error)throw error;const i=vehicles.findIndex(x=>x.id===v.id);if(i>=0)vehicles[i]={...vehicles[i],...body};showToast(body.plate+' güncellendi');}
      else{const{data,error}=await sb.from('vehicles').insert(body).select().single();if(error)throw error;vehicles.push(data);showToast(body.plate+' eklendi');}
      closeSheet();renderFilo();
    }catch(e){showToast(e.message,'err');}
  },'Kaydet');
}

// ── ADRES DEFTERİ ─────────────────────────────────────
function renderAdresler(){
  const turColors={'Müşteri':'b-blue','Yükleme Noktası':'b-amber','Teslimat Noktası':'b-green','Gümrük Müşaviri':'b-gray','Acente':'b-gray'};
  $('page-adresler').innerHTML=`
    <div style="padding:12px 12px 0">
      <input class="inp" placeholder="Firma veya kişi ara..." oninput="filterAddr(this.value)" style="font-size:14px">
    </div>
    <div id="addr-list">
      ${renderAddrList(addresses)}
    </div>`;
}

function renderAddrList(list){
  const turColors={'Müşteri':'b-blue','Yükleme Noktası':'b-amber','Teslimat Noktası':'b-green','Gümrük Müşaviri':'b-gray'};
  if(!list.length) return '<div style="padding:32px;text-align:center;color:var(--text2)">Adres bulunamadı</div>';
  return list.map(a=>`
    <div class="addr-card" onclick='openAddrDetail(${JSON.stringify(a.id)})'>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1"><div class="addr-firma">${a.firma}</div><div class="addr-info">${[a.adres,a.yetkili?a.yetkili+(a.unvan?' — '+a.unvan:''):''].filter(Boolean).join(' · ')}</div></div>
        <span class="badge ${turColors[a.tur]||'b-gray'}" style="flex-shrink:0">${a.tur}</span>
      </div>
      ${a.tel||a.email?`<div class="addr-info" style="margin-top:4px">${[a.tel,a.email].filter(Boolean).join(' · ')}</div>`:''}
      ${a.vade?`<div style="margin-top:4px;font-size:12px;font-weight:600;color:var(--amber-text)">Vade: ${a.vade}${a.odeme_gun?' — '+a.odeme_gun:''}</div>`:''}
      ${a.notlar?`<div style="margin-top:4px;font-size:12px;color:var(--text2);font-style:italic">${a.notlar}</div>`:''}
    </div>`).join('');
}

function filterAddr(q){
  const f=q?addresses.filter(a=>(a.firma+a.yetkili).toLowerCase().includes(q.toLowerCase())):addresses;
  const el=$('addr-list');if(el)el.innerHTML=renderAddrList(f);
}

function openAddrDetail(id){
  const a=addresses.find(x=>x.id===id);if(!a)return;
  const turColors={'Müşteri':'b-blue','Yükleme Noktası':'b-amber','Teslimat Noktası':'b-green','Gümrük Müşaviri':'b-gray'};
  openSheet(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--green-bg);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0">${(a.firma||'?').substring(0,2).toUpperCase()}</div>
      <div><div style="font-size:17px;font-weight:700">${a.firma}</div><span class="badge ${turColors[a.tur]||'b-gray'}">${a.tur}</span></div>
    </div>
    ${[
      {l:'Adres',v:a.adres},
      {l:'Telefon',v:a.tel},
      {l:'E-posta',v:a.email},
      {l:'Yetkili',v:a.yetkili+(a.unvan?' — '+a.unvan:'')},
      {l:'Çalışma Saati',v:a.saat},
      {l:'Ödeme Vadesi',v:a.vade+(a.odeme_gun?' — '+a.odeme_gun:''),color:'var(--amber-text)'},
      {l:'Fatura Gönderim',v:a.fatura_yontem+(a.fatura_email?' · '+a.fatura_email:'')},
      {l:'Fatura Posta Adresi',v:a.fatura_adres},
      {l:'Notlar',v:a.notlar,italic:true},
    ].filter(r=>r.v).map(r=>`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text2)">${r.l}</div><div style="font-size:14px;margin-top:2px${r.color?'  ;color:'+r.color:''}${r.italic?';font-style:italic;color:var(--text2)':''}">${r.v}</div></div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-sm" style="flex:1" onclick='closeSheet();openAddrForm(${JSON.stringify(a.id)})'>✏️ Düzenle</button>
      <button class="btn btn-red btn-sm" style="flex:1;background:none;color:var(--red);border-color:var(--red)" onclick='deleteAddr(${JSON.stringify(a.id)})'>🗑 Sil</button>
    </div>
  `,a.firma,null,null);
}

function openAddrForm(id){
  const a=id?addresses.find(x=>x.id===id):null;
  openSheet(`
    <div class="fg"><span class="lbl">Firma Adı</span><input class="inp" id="af-f" value="${a?.firma||''}" placeholder="Firma adı"></div>
    <div class="fg"><span class="lbl">Tür</span><select class="inp" id="af-t"><option${a?.tur==='Müşteri'?' selected':''}>Müşteri</option><option${a?.tur==='Yükleme Noktası'?' selected':''}>Yükleme Noktası</option><option${a?.tur==='Teslimat Noktası'?' selected':''}>Teslimat Noktası</option><option${a?.tur==='Gümrük Müşaviri'?' selected':''}>Gümrük Müşaviri</option><option${a?.tur==='Acente'?' selected':''}>Acente</option></select></div>

    <div class="fg"><span class="lbl">E-posta (Operasyonel)</span><input class="inp" type="email" id="af-em" value="${a?.email||''}" placeholder="logistics@firma.com"></div>

    <div class="fg"><span class="lbl">Çalışma Saati</span><input class="inp" id="af-sa" value="${a?.saat||''}" placeholder="08:00 – 17:00"></div>

    <div class="form-sec">Ödeme & Fatura Bilgileri</div>

      <div class="fg"><span class="lbl">Ödeme Vadesi</span><select class="inp" id="af-vd"><option value="">—</option><option${a?.vade==='Peşin'?' selected':''}>Peşin</option><option${a?.vade==='15 gün'?' selected':''}>15 gün</option><option${a?.vade==='30 gün'?' selected':''}>30 gün</option><option${a?.vade==='45 gün'?' selected':''}>45 gün</option><option${a?.vade==='60 gün'?' selected':''}>60 gün</option><option${a?.vade==='90 gün'?' selected':''}>90 gün</option></select></div>
      <div class="fg"><span class="lbl">Ödeme Günü</span><select class="inp" id="af-og"><option value="">—</option><option>Her Cuma</option><option>Her Pazartesi</option><option>Ayın 1'i</option><option>Ayın 15'i</option><option>Ay sonu</option></select></div>
    </div>

    <div class="fg"><span class="lbl">Fatura E-posta Adresi</span><input class="inp" type="email" id="af-fe" value="${a?.fatura_email||''}" placeholder="invoice@firma.com"></div>
    <div class="fg"><span class="lbl">Fatura Posta Adresi</span><input class="inp" id="af-fadres" value="${a?.fatura_adres||''}" placeholder="Posta adresi"></div>

    <div class="form-sec">Notlar</div>
    <textarea class="inp" id="af-notlar" rows="3" placeholder="Özel talimatlar, notlar...">${a?.notlar||''}</textarea>
    <div style="height:8px"></div>
  `, a?'Adres Düzenle':'Yeni Adres Ekle', null, async()=>{
    const body={firma:$('af-f')?.value||''  ,tur:$('af-t')?.value||'Müşteri',adres:$('af-a')?.value||''  ,tel:$('af-tel')?.value||''  ,email:$('af-em')?.value||''  ,yetkili:$('af-yk')?.value||''  ,unvan:$('af-uv')?.value||''  ,saat:$('af-sa')?.value||''  ,vade:$('af-vd')?.value||''  ,odeme_gun:$('af-og')?.value||''  ,fatura_yontem:$('af-fy')?.value||'email',fatura_email:$('af-fe')?.value||''  ,fatura_adres:$('af-fadres')?.value||''  ,notlar:$('af-notlar')?.value||''  };
    if(!body.firma){showToast('Firma adı girin','warn');return;}
    try{
      if(a){const{error}=await sb.from('addresses').update(body).eq('id',a.id);if(error)throw error;const i=addresses.findIndex(x=>x.id===a.id);if(i>=0)addresses[i]={...addresses[i],...body};showToast(body.firma+' güncellendi');}
      else{const{data,error}=await sb.from('addresses').insert(body).select().single();if(error)throw error;addresses.push(data);showToast(body.firma+' eklendi');}
      closeSheet();renderAdresler();

async function deleteAddr(id){
  if(!confirm('Bu adresi silmek istediğinizden emin misiniz?'))return;
  try{const{error}=await sb.from('addresses').delete().eq('id',id);if(error)throw error;addresses=addresses.filter(x=>x.id!==id);closeSheet();renderAdresler();showToast('Silindi');}catch(e){showToast(e.message,'err');}
}

    orders.map(o=>`<div class="list-item" onclick='openCMRDetail(${JSON.stringify(o.id)})'>
      <div class="li-main"><div class="li-title">CMR-${o.id.replace('OZC-','')}</div><div class="li-sub">${o.musteri} · ${fmtDate(o.yuktar)}</div><div class="li-sub">${o.yukleme||'—'} → ${o.teslimat||'—'}</div></div>

        <div class="cb full"><span class="cmr-num">9-12</span><label>Yük/Goods</label><p>${o.yuk||'—'} · ${o.ambalaj||'—'} · ${o.kg?fmt(o.kg)+' kg':'—'} · ${o.hacim||'—'} m³</p></div>

function openIhbarGecmisi(){
  openSheet('<div style="padding:8px 0">'+
    (ihbarlar.length?ihbarlar.map(ih=>`<div class="list-item" style="cursor:default">
      <div class="li-main"><div class="li-title">${ih.musteri||'—'}</div><div class="li-sub" style="font-family:monospace">${ih.siparis_id||'—'}</div><div class="li-sub">${ih.email||'—'}</div><div class="li-sub">${ih.created_at?ih.created_at.substring(0,16).replace('T',' '):'—'}</div></div>
      <div class="li-right"><span class="badge b-blue">${ih.lang||'TR'}</span><span class="badge b-green">${ih.durum||'Gönderildi'}</span></div>

function openTopluKonum(){
  const aktif=orders.filter(o=>o.durum==='Yolda'||o.durum==='Planlandı');
  openSheet(`
    <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;color:var(--text2)">${aktif.length} aktif sipariş</span>
      <div class="lang-toggle">
        <button class="lang-btn active" id="tk-tr" onclick="topluLang='TR';updateTopluBtns()">TR</button>
        <button class="lang-btn" id="tk-en" onclick="topluLang='EN';updateTopluBtns()">EN</button>
      </div>
    </div>
    ${aktif.map(o=>`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-size:13px;font-weight:600">${o.id} — ${o.musteri}</div><div style="font-size:12px;color:var(--text2)">${(o.arac||'—').split(' — ')[0]} · ${o.konum||'—'}</div></div>`).join('')}
    <button class="btn btn-green btn-full" style="margin-top:16px" onclick="sendTopluKonum(${JSON.stringify(aktif.map(o=>o.id))})">Tüm Müşterilere Gönder (${aktif.length})</button>
  ','Toplu Konum Bildirimi',null,null);
}
let topluLang='TR';
function updateTopluBtns(){['tr','en'].forEach(l=>{const b=$('tk-'+l);if(b)b.className='lang-btn'+(l.toUpperCase()===topluLang?' active':''};});}
async function sendTopluKonum(ids){
  for(const id of ids){
    const o=orders.find(x=>x.id===id);if(!o)continue;
    await sb.from('notif_history').insert({siparis_id:o.id,musteri:o.musteri,yetkili:o.yetkili||'',konum:o.konum||'',lang:topluLang,created_by:currentUser?.username||''});
  }
  showToast(ids.length+' müşteriye konum bildirimi gönderildi');closeSheet();await loadNotifHistory();
}

function openTransportOrderList(){
  const extO=orders.filter(o=>o.nakliyeci);
  openSheet('<div style="padding:8px 0">'+
    (extO.length?extO.map(o=>`<div class="list-item" onclick='openTransportOrder(${JSON.stringify(o.id)})'>
      <div class="li-main"><div class="li-title">${o.nakliyeci}</div><div class="li-sub" style="font-family:monospace">${o.id}</div><div class="li-sub">${o.yukleme||'—'} → ${o.teslimat||'—'}</div></div>
      <div class="li-right"><div class="li-amount">${o.para||'EUR'} ${fmt(o.dis_navlun||0)}</div></div>
    </div>`).join(''):'<div style="padding:32px;text-align:center;color:var(--text2)">Dış araç siparişi yok</div>')+
  '</div>','Transport Orders',null,null);
}

// ── SHEET MODAL ───────────────────────────────────────
function openSheet(content,title,badge,onConfirm,confirmLabel,maxH){
  $('sheet-title').textContent=title||''  ;
  $('sheet-body').innerHTML=content;
  const f=$('sheet-footer');
  if(onConfirm){f.style.display='flex';$('sheet-confirm').textContent=confirmLabel||'Kaydet';$('sheet-confirm').onclick=onConfirm;}
  else{f.style.display='none';}
  $('sheet-overlay').classList.add('open');
  // Scroll to top
  setTimeout(()=>{ const s=$('sheet-box');if(s)s.scrollTop=0;},50);
}
function closeSheet(){$('sheet-overlay').classList.remove('open');}

// ── INIT ──────────────────────────────────────────────
window.addEventListener('load',()=>{
  // Loading ekranını hızla kapat, login göster
  $('loading').style.display='none';
  $('login').classList.add('show');
});
</script>
